name: Build APK (debug, para pruebas)

# Se dispara manualmente desde la pestaña Actions de GitHub.
# Compila un APK de debug instalable en cualquier teléfono Android
# (no sirve para subir a Play Store — para eso hace falta el AAB firmado con el keystore de release).
on:
  workflow_dispatch:
  push:
    branches: [test/capacitor-7]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web (base nativa)
        run: npm run build:native

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
