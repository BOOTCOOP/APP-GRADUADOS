<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1242, initial-scale=1" />
    <title>Graduados Derecho - App Store</title>
    <style>
      :root {
        --blue: #0f4c81;
        --blue-dark: #123f67;
        --gold: #d7a441;
        --ink: #152235;
        --muted: #627089;
        --paper: #f7f9fc;
        --line: #dfe6ef;
        --green: #1f9d74;
        --red: #b43d47;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1242px;
        height: 2688px;
        overflow: hidden;
        font-family: "Nunito Sans", Arial, sans-serif;
        color: var(--ink);
        background: #eef3f8;
      }

      .canvas {
        position: relative;
        width: 1242px;
        height: 2688px;
        padding: 138px 86px 92px;
        background:
          radial-gradient(circle at 20% 10%, rgba(215, 164, 65, 0.18), transparent 280px),
          linear-gradient(160deg, #ffffff 0%, #eef5fb 54%, #e8edf5 100%);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 24px;
        height: 116px;
      }

      .brand img {
        width: 96px;
        max-height: 96px;
        object-fit: contain;
      }

      .brand-text {
        font-size: 30px;
        line-height: 1.18;
        color: var(--blue-dark);
        font-weight: 800;
      }

      .hero {
        margin-top: 86px;
      }

      .eyebrow {
        color: var(--gold);
        font-size: 30px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0;
        margin-bottom: 28px;
      }

      h1 {
        margin: 0;
        max-width: 1030px;
        font-size: 84px;
        line-height: 1.03;
        letter-spacing: 0;
        color: var(--ink);
      }

      .subtitle {
        margin: 34px 0 0;
        max-width: 900px;
        color: var(--muted);
        font-size: 36px;
        line-height: 1.28;
        font-weight: 600;
      }

      .phone {
        position: absolute;
        left: 231px;
        bottom: 104px;
        width: 780px;
        height: 1628px;
        border-radius: 96px;
        padding: 28px;
        background: #101826;
        box-shadow: 0 44px 92px rgba(21, 34, 53, 0.28);
      }

      .screen {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 72px;
        background: #ffffff;
      }

      .notch {
        position: absolute;
        z-index: 6;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        width: 250px;
        height: 38px;
        border-radius: 0 0 22px 22px;
        background: #101826;
      }

      .status {
        height: 72px;
        padding: 28px 38px 0;
        display: flex;
        justify-content: space-between;
        color: #111927;
        font-size: 21px;
        font-weight: 800;
      }

      .bars {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .bars span {
        display: block;
        width: 10px;
        background: #111927;
        border-radius: 10px;
      }

      .bars span:nth-child(1) { height: 12px; }
      .bars span:nth-child(2) { height: 18px; }
      .bars span:nth-child(3) { height: 24px; }

      .appbar {
        height: 86px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 34px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
      }

      .appbar-title {
        color: var(--blue);
        font-size: 26px;
        font-weight: 900;
      }

      .menu-icon,
      .bell {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        color: var(--blue);
        font-size: 28px;
        font-weight: 900;
      }

      .content {
        height: calc(100% - 158px);
        padding: 34px;
        overflow: hidden;
        background: #fbfcfe;
      }

      .logo-panel {
        height: 258px;
        display: grid;
        place-items: center;
        margin-bottom: 24px;
      }

      .logo-panel img {
        width: 470px;
        max-height: 210px;
        object-fit: contain;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 22px;
      }

      .tile,
      .wide-tile,
      .list-item,
      .benefit {
        background: #ffffff;
        border: 1px solid #e4ebf2;
        box-shadow: 0 10px 24px rgba(21, 34, 53, 0.08);
      }

      .tile {
        height: 178px;
        border-radius: 26px;
        padding: 24px 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 18px;
      }

      .wide-tile {
        grid-column: 1 / -1;
        height: 166px;
        border-radius: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }

      .icon {
        width: 66px;
        height: 66px;
        border-radius: 20px;
        display: grid;
        place-items: center;
        background: #eaf2fb;
        color: var(--blue);
        font-size: 34px;
        font-weight: 900;
      }

      .tile span,
      .wide-tile span {
        font-size: 24px;
        line-height: 1.16;
        color: var(--blue);
        font-weight: 800;
      }

      .section-title {
        margin: 0 0 22px;
        color: var(--blue);
        font-size: 34px;
        line-height: 1.15;
        font-weight: 900;
      }

      .search {
        height: 72px;
        border-radius: 24px;
        padding: 0 26px;
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 26px;
        background: #eef4fa;
        color: var(--muted);
        font-size: 23px;
        font-weight: 700;
      }

      .chip-row {
        display: flex;
        gap: 12px;
        margin-bottom: 28px;
      }

      .chip {
        border-radius: 999px;
        padding: 14px 22px;
        background: #e9f1fb;
        color: var(--blue);
        font-size: 20px;
        font-weight: 900;
      }

      .list {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .list-item {
        border-radius: 24px;
        padding: 24px;
        display: grid;
        grid-template-columns: 76px 1fr;
        gap: 22px;
      }

      .list-item h3,
      .benefit h3 {
        margin: 0 0 10px;
        color: var(--ink);
        font-size: 27px;
        line-height: 1.12;
      }

      .list-item p,
      .benefit p {
        margin: 0;
        color: var(--muted);
        font-size: 21px;
        line-height: 1.28;
        font-weight: 650;
      }

      .meta {
        margin-top: 18px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .meta span {
        border-radius: 999px;
        padding: 9px 14px;
        background: #f1f5f9;
        color: #43516a;
        font-size: 18px;
        font-weight: 800;
      }

      .cta {
        height: 76px;
        border-radius: 26px;
        margin-top: 26px;
        display: grid;
        place-items: center;
        background: var(--blue);
        color: #ffffff;
        font-size: 25px;
        font-weight: 900;
      }

      .benefit {
        border-radius: 28px;
        overflow: hidden;
      }

      .benefit-top {
        height: 150px;
        padding: 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(135deg, var(--blue), #2773ad);
        color: #ffffff;
      }

      .discount {
        font-size: 54px;
        font-weight: 900;
      }

      .benefit-body {
        padding: 24px;
      }

      .contact-row {
        height: 112px;
        border-radius: 24px;
        margin-bottom: 18px;
        padding: 0 26px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #ffffff;
        border: 1px solid #e4ebf2;
        box-shadow: 0 10px 24px rgba(21, 34, 53, 0.08);
      }

      .contact-row span {
        font-size: 24px;
        font-weight: 850;
      }

      .bar-accent {
        width: 10px;
        align-self: stretch;
        border-radius: 8px;
        background: var(--gold);
      }

      .footer-note {
        position: absolute;
        left: 86px;
        right: 86px;
        bottom: 36px;
        text-align: center;
        color: #7a8597;
        font-size: 21px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="canvas">
      <section class="brand">
        <img src="../../public/assets/logo/logo.png" alt="Graduados Derecho" />
        <div class="brand-text">Centro de Graduadas y Graduados<br />Facultad de Derecho UBA</div>
      </section>
      <section class="hero">
        <div class="eyebrow" id="eyebrow"></div>
        <h1 id="headline"></h1>
        <p class="subtitle" id="subtitle"></p>
      </section>
      <section class="phone">
        <div class="screen">
          <div class="notch"></div>
          <div class="status">
            <span>9:41</span>
            <div class="bars"><span></span><span></span><span></span></div>
          </div>
          <div class="appbar">
            <div class="menu-icon">=</div>
            <div class="appbar-title" id="appTitle">Graduados Derecho</div>
            <div class="bell">o</div>
          </div>
          <div class="content" id="screenContent"></div>
        </div>
      </section>
      <div class="footer-note">Captura preparada en 1242 x 2688 px para iPhone 6,5"</div>
    </main>

    <script>
      const slides = [
        {
          eyebrow: "Todo en un solo lugar",
          headline: "La comunidad de Derecho UBA, en tu telefono",
          subtitle: "Acceso rapido a cursos, talleres, biblioteca, noticias, beneficios y contacto institucional.",
          title: "Inicio",
          content: `
            <div class="logo-panel"><img src="../../public/assets/logo/logo.png" alt=""></div>
            <div class="grid">
              ${tile("C", "Cursos")}
              ${tile("T", "Talleres y Jornadas")}
              ${tile("Y", "Actividades Online")}
              ${tile("L", "Busqueda laboral")}
              ${tile("B", "Biblioteca")}
              ${tile("N", "Noticias")}
              ${tile("I", "Informacion de interes")}
              ${tile("D", "Beneficios")}
              <div class="wide-tile"><div class="icon">W</div><span>Contacto</span></div>
            </div>
          `,
        },
        {
          eyebrow: "Formacion continua",
          headline: "Cursos y talleres para seguir creciendo",
          subtitle: "Consulta propuestas academicas, modalidades, cupos e inscripciones desde la app.",
          title: "Cursos",
          content: `
            <h2 class="section-title">Cursos de Perfeccionamiento</h2>
            <div class="search">Buscar por tema, materia o palabra clave</div>
            <div class="chip-row"><div class="chip">Disponibles</div><div class="chip">Online</div><div class="chip">UBA</div></div>
            <div class="list">
              ${item("P", "Actualizacion en Derecho y tecnologia", "Programa de formacion profesional con modalidad hibrida.", ["Online", "Inscripcion abierta"])}
              ${item("M", "Taller de mediacion y negociacion", "Herramientas practicas para la resolucion de conflictos.", ["Presencial", "Cupos limitados"])}
              ${item("F", "Finanzas para estudios juridicos", "Gestion, honorarios y administracion profesional.", ["Virtual", "Certificado"])}
            </div>
            <div class="cta">Ver propuestas disponibles</div>
          `,
        },
        {
          eyebrow: "Oportunidades",
          headline: "Busqueda laboral especializada para graduados",
          subtitle: "Encuentra publicaciones del sector juridico, guarda favoritos y postulate con informacion clara.",
          title: "Busqueda laboral",
          content: `
            <h2 class="section-title">Busqueda laboral</h2>
            <div class="search">Buscar puesto, estudio o area legal</div>
            <div class="chip-row"><div class="chip">Remoto</div><div class="chip">Hibrido</div><div class="chip">Full time</div></div>
            <div class="list">
              ${item("A", "Abogada/o junior", "Estudio juridico busca perfil para derecho civil y comercial.", ["CABA", "Hibrido"])}
              ${item("C", "Compliance analyst", "Empresa incorpora graduado/a para seguimiento normativo.", ["Remoto", "Inmediato"])}
              ${item("E", "Publica tu busqueda", "Herramientas para compartir oportunidades con la comunidad.", ["Empleadores", "Graduados"])}
            </div>
            <div class="cta">Explorar oportunidades</div>
          `,
        },
        {
          eyebrow: "Recursos",
          headline: "Biblioteca, noticias e informacion institucional",
          subtitle: "Material bibliografico, novedades, enlaces utiles y comunicaciones importantes siempre disponibles.",
          title: "Biblioteca",
          content: `
            <h2 class="section-title">Material Bibliografico</h2>
            <div class="search">Buscar documentos, autores o temas</div>
            <div class="list">
              ${item("PDF", "Legislacion y doctrina", "Documentos organizados por categorias para consulta rapida.", ["PDF", "Descarga"])}
              ${item("N", "Noticias institucionales", "Novedades del Centro de Graduadas y Graduados.", ["Eventos", "Comunidad"])}
              ${item("I", "Informacion de interes", "Guias, tramites y enlaces importantes para graduados.", ["Tramites", "Servicios"])}
            </div>
            <div class="cta">Acceder a recursos</div>
          `,
        },
        {
          eyebrow: "Beneficios y contacto",
          headline: "Servicios y canales directos para la comunidad",
          subtitle: "Beneficios exclusivos, redes sociales y vias de atencion reunidas en una experiencia simple.",
          title: "Beneficios",
          content: `
            <h2 class="section-title">Beneficios exclusivos</h2>
            <div class="benefit">
              <div class="benefit-top"><span>Comunidad Graduados</span><strong class="discount">20%</strong></div>
              <div class="benefit-body"><h3>Descuentos y promociones</h3><p>Convenios y beneficios especiales para graduadas y graduados.</p></div>
            </div>
            <h2 class="section-title" style="margin-top:32px">Contacto</h2>
            <div class="contact-row"><span>Atencion y consultas</span><div class="bar-accent" style="background:#1f9d74"></div></div>
            <div class="contact-row"><span>Canal de Youtube</span><div class="bar-accent" style="background:#b43d47"></div></div>
            <div class="contact-row"><span>Redes sociales oficiales</span><div class="bar-accent"></div></div>
          `,
        },
      ];

      function tile(icon, text) {
        return `<div class="tile"><div class="icon">${icon}</div><span>${text}</span></div>`;
      }

      function item(icon, title, body, tags) {
        return `<div class="list-item"><div class="icon">${icon}</div><div><h3>${title}</h3><p>${body}</p><div class="meta">${tags.map((tag) => `<span>${tag}</span>`).join("")}</div></div></div>`;
      }

      const index = Math.max(0, Math.min(slides.length - 1, Number(location.hash.replace("#", "")) || 0));
      const slide = slides[index];
      document.getElementById("eyebrow").textContent = slide.eyebrow;
      document.getElementById("headline").textContent = slide.headline;
      document.getElementById("subtitle").textContent = slide.subtitle;
      document.getElementById("appTitle").textContent = slide.title;
      document.getElementById("screenContent").innerHTML = slide.content;
    </script>
  </body>
</html>
